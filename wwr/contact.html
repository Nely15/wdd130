<!Doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with our White Water Rafting Company. Find our location, 
      phone numbers, emails, and contact our team.">
    <meta name="author" content="Blanca Ruiz">
    <title>Contact Us | White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p><strong>Address:</strong> 123 River Rd.</p>
            <p>Adventure City, TX 75001</p>
            <p><strong>Phone:</strong> (956) 456-7890</p>
            <p><strong>Email:</strong>info@whitewaterrafting.com</p>
        </section>

        <!--Map & form side by side-->
        <section class="contact-layout">

            <!--Google map-->
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d27680.239993284886!2d-98.17087382602541!3d29.863408669956836!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1swhite%20water%20rafting!5e0!3m2!1sen!2sus!4v1775325072054!5m2!1sen!2sus"
                  width="600" height="450" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <!--Form-->
            <div class="contact-form">
                <form>

                    <label>
                        Name
                        <input type="text" id="name" name="name" placeholder="Enter your name">
                    </label>

                    <label>
                        Email
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                    </label>

                    <p>Message Purpose</p>

                    <label>
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label>
                        Message
                        <textarea id="message" name="message" placeholder="Type here"></textarea>
                    </label>

                    <label>
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please Subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>

            </div>

        </section>

        <!-- Employee profiles -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Stephen Tyler, Lead Guide">
                    <figcaption><strong>Stephen<br>Tyler</strong>
                        <hr>
                        Lead River Guide
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Robert Williams, Safety Officer">
                    <figcaption><strong>Robert<br>Williams</strong>
                        <hr>
                        Safety Officer
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Daniel Garza, Operations Manager">
                    <figcaption><strong>Daniel<br>Garza</strong>
                        <hr>
                        Operations Manager
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee4.jpg" alt="Joseph Long, Equipment Technician">
                    <figcaption><strong>Joseph<br>Long</strong>
                        <hr>
                        Equipment Technician
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee5.jpg" alt="Elizabeth Carson, Social Media Executive">
                    <figcaption><strong>Elizabeth<br>Carson</strong>
                        <hr>
                        Social Media Executive
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee6.jpg"
                      alt="Nathan Mcpherson, Sales & Booking Manager ">
                    <figcaption><strong>Nathan<br>Mcpherson</strong>
                        <hr>
                        Sales & Booking Manager
                    </figcaption>
                </figure>

            </div>
        </section>


    </main>

    <footer>
        <p>© 2026 White Water Rafting Company | Blanca Ruiz</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-logo.jpg" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-logo.jpg" alt="Instagram Icon">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter-logo.jpg" alt="Twitter Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
